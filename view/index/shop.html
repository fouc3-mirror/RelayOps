{extend name="layout_user"}

{block name="title"}商品列表 - {$site.site_name ?? '雨梦FRPS业务管理系统'}{/block}

{block name="head"}
<link rel="stylesheet" href="/themes/cart.css">
{/block}

{block name="content"}
<div class="shop-page" style="padding:32px 40px;">
    <div class="shop-header">
        <h2>购买隧道节点</h2>
        <a href="/console" class="back-link">← 返回控制台</a>
    </div>

    <div id="productList" class="product-grid">
        <div class="loading-placeholder"><div class="icon"></div><p>加载中...</p></div>
    </div>
</div>

<script>
fetch('/api/user/products', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
    .then(function(r) { return r.json(); })
    .then(function(res) {
        if (res.code !== 1 || !res.data || !res.data.length) {
            document.getElementById('productList').innerHTML = '<div class="empty-state"><div class="icon"></div><p>暂无在售商品</p></div>';
            return;
        }
        var html = res.data.map(function(p) {
            var tagColor = {tcp:'#409eff',udp:'#e6a23c',http:'#67c23a',https:'#f56c6c'}[p.proxy_type] || '#999';
            return '<div class="product-card">' +
                '<div class="top">' +
                    '<h3>' + p.name + '</h3>' +
                    '<span class="tag" style="background:' + tagColor + ';">' + p.proxy_type.toUpperCase() + '</span>' +
                '</div>' +
                '<div class="meta">' + p.node_name + '</div>' +
                '<div class="port-range">端口范围：<span>' + p.port_start + '-' + p.port_end + '</span></div>' +
                '<div class="price">¥<strong>' + parseFloat(p.price).toFixed(2) + '</strong>/月</div>' +
                (p.description ? '<div class="desc">' + p.description + '</div>' : '') +
                '<div style="flex:1;"></div>' +
                '<a href="/product/' + p.id + '" class="btn-order">立即订购</a>' +
            '</div>';
        }).join('');
        document.getElementById('productList').innerHTML = html;
    })
    .catch(function() {
        document.getElementById('productList').innerHTML = '<div class="load-error">加载失败</div>';
    });
</script>
{/block}
