<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - {$site.site_name ?? '雨梦FRPS多节点管理系统'}</title>
    <link rel="icon" href="{$site.site_favicon ?? '/favicon.ico'}" type="image/x-icon">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1d1e2c 0%, #2c3e6b 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; }
        .login-wrapper { width: 420px; background: #fff; border-radius: 14px; padding: 44px 40px; box-shadow: 0 24px 64px rgba(0,0,0,0.35); }
        .login-wrapper h2 { text-align: center; margin-bottom: 6px; font-size: 22px; color: #1d1e2c; }
        .login-wrapper .sub { text-align: center; margin-bottom: 32px; font-size: 14px; color: #999; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 11px 14px; border: 1px solid #dcdfe6; border-radius: 6px; font-size: 14px; outline: none; transition: border .2s; }
        .form-group input:focus { border-color: #409eff; box-shadow: 0 0 0 3px rgba(64,158,255,0.12); }
        .form-btn { width: 100%; padding: 12px; background: #409eff; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: all .2s; font-weight: 500; }
        .form-btn:hover { background: #337ecc; box-shadow: 0 4px 14px rgba(64,158,255,0.35); transform: translateY(-1px); }
        .form-tip { text-align: center; margin-top: 16px; font-size: 13px; min-height: 20px; }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: #999; font-size: 13px; text-decoration: none; }
        .back-link a:hover { color: #409eff; }

        .forgot-link { text-align: right; margin-bottom: 12px; }
        .forgot-link a { font-size: 13px; color: #909399; text-decoration: none; }
        .forgot-link a:hover { color: #409eff; }
        .forgot-password { display: none; }
        .forgot-password .fp-title { font-size: 18px; color: #333; margin-bottom: 24px; text-align: center; font-weight: 500; }
        .fp-step { display: none; }
        .fp-step.active { display: block; }
        .verify-group { display: flex; gap: 10px; }
        .verify-group input { flex: 1; }
        .verify-btn { padding: 10px 16px; background: #67c23a; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .verify-btn:hover { background: #5daf34; }
        .verify-btn:disabled { background: #a0cfac; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <h2><?php if (!empty($site['site_logo'])): ?><img src="<?= htmlspecialchars($site['site_logo']) ?>" alt="<?= htmlspecialchars($site['site_name'] ?? '雨梦FRPS多节点管理系统') ?>" style="height: 36px; vertical-align: middle; margin-right: 8px;"><?php endif; ?> <?= htmlspecialchars($site['site_name'] ?? '雨梦FRPS多节点管理系统') ?></h2>
        <div class="sub">管理员登录</div>
        <form onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>管理员账号</label>
                <input type="text" id="username" placeholder="请输入管理员账号" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="form-btn">登 录</button>
        </form>
        <div class="forgot-link"><a href="javascript:void(0)" onclick="showForgotPassword()">忘记密码？</a></div>
        <div class="form-tip" id="msg"></div>

        <div id="forgotPassword" class="forgot-password">
            <div class="fp-title">管理员找回密码</div>
            <div id="fpStep1" class="fp-step active">
                <div class="form-group">
                    <label>管理员账号</label>
                    <input type="text" id="fpUsername" placeholder="请输入管理员账号">
                </div>
                <button type="button" class="form-btn" id="fpSendBtn" onclick="sendResetCode()">发送验证码</button>
                <div class="back-link"><a href="javascript:void(0)" onclick="hideForgotPassword()">← 返回登录</a></div>
            </div>
            <div id="fpStep2" class="fp-step">
                <div class="form-group">
                    <label>验证码</label>
                    <div class="verify-group">
                        <input type="text" id="fpCode" placeholder="请输入验证码" maxlength="6">
                        <button type="button" class="verify-btn" id="fpResendBtn" onclick="sendResetCode()">重新发送</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" id="fpPassword" placeholder="请输入新密码（至少6位）" minlength="6">
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" id="fpPassword2" placeholder="请再次输入新密码">
                </div>
                <button type="button" class="form-btn" id="fpResetBtn" onclick="handleResetPassword()">重置密码</button>
                <div class="form-tip" id="fpMsg"></div>
                <div class="back-link"><a href="javascript:void(0)" onclick="hideForgotPassword()">← 返回登录</a></div>
            </div>
        </div>

        <div class="back-link"><a href="/">← 返回首页</a></div>
    </div>

    <script>
    var fpCountdown = 0;
    var fpTimer = null;

    function showForgotPassword() {
        document.querySelector('.login-wrapper form').style.display = 'none';
        document.querySelector('.login-wrapper .forgot-link').style.display = 'none';
        document.getElementById('msg').textContent = '';
        document.getElementById('forgotPassword').style.display = 'block';
        document.getElementById('fpStep1').classList.add('active');
        document.getElementById('fpStep2').classList.remove('active');
        document.getElementById('fpMsg').textContent = '';
        document.getElementById('fpUsername').value = '';
        document.getElementById('fpCode').value = '';
        document.getElementById('fpPassword').value = '';
        document.getElementById('fpPassword2').value = '';
        var loginUsername = document.getElementById('username').value;
        if (loginUsername) { document.getElementById('fpUsername').value = loginUsername; }
    }

    function hideForgotPassword() {
        document.querySelector('.login-wrapper form').style.display = 'block';
        document.querySelector('.login-wrapper .forgot-link').style.display = 'block';
        document.getElementById('forgotPassword').style.display = 'none';
        document.getElementById('msg').textContent = '';
        if (fpTimer) { clearInterval(fpTimer); fpTimer = null; }
        fpCountdown = 0;
    }

    async function sendResetCode() {
        var username = document.getElementById('fpUsername').value.trim();
        var btn = document.getElementById('fpSendBtn');
        var resendBtn = document.getElementById('fpResendBtn');
        var msg = document.getElementById('fpMsg');

        if (!username) { msg.style.color = '

        if (btn) { btn.disabled = true; btn.textContent = '发送中...'; }
        if (resendBtn) { resendBtn.disabled = true; resendBtn.textContent = '发送中...'; }
        msg.style.color = '#999'; msg.textContent = '';

        try {
            var res = await fetch('/api/admin/send-reset-verify', {
                method: 'POST',
                body: 'username=' + encodeURIComponent(username),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' }
            });
            var json = await res.json();
            if (json.code === 1) {
                msg.style.color = '#67c23a';
                msg.textContent = '验证码已发送至管理员邮箱';
                document.getElementById('fpStep1').classList.remove('active');
                document.getElementById('fpStep2').classList.add('active');
                fpCountdown = 60;
                var targetBtn = resendBtn || btn;
                targetBtn.textContent = fpCountdown + '秒后重试';
                fpTimer = setInterval(function() {
                    fpCountdown--;
                    if (fpCountdown <= 0) {
                        clearInterval(fpTimer); fpTimer = null;
                        targetBtn.disabled = false;
                        targetBtn.textContent = resendBtn ? '重新发送' : '发送验证码';
                        if (btn) { btn.disabled = false; btn.textContent = '发送验证码'; }
                    } else {
                        targetBtn.textContent = fpCountdown + '秒后重试';
                        if (btn) btn.textContent = fpCountdown + '秒后重试';
                    }
                }, 1000);
            } else {
                msg.style.color = '#f56c6c';
                msg.textContent = json.msg || '发送失败';
                if (btn) { btn.disabled = false; btn.textContent = '发送验证码'; }
                if (resendBtn) { resendBtn.disabled = false; resendBtn.textContent = '重新发送'; }
            }
        } catch(err) {
            msg.style.color = '
            if (btn) { btn.disabled = false; btn.textContent = '发送验证码'; }
            if (resendBtn) { resendBtn.disabled = false; resendBtn.textContent = '重新发送'; }
        }
    }

    async function handleResetPassword() {
        var username = document.getElementById('fpUsername').value.trim();
        var code = document.getElementById('fpCode').value;
        var password = document.getElementById('fpPassword').value;
        var password2 = document.getElementById('fpPassword2').value;
        var btn = document.getElementById('fpResetBtn');
        var msg = document.getElementById('fpMsg');

        if (!code) { msg.style.color = '
        if (password.length < 6) { msg.style.color = '
        if (password !== password2) { msg.style.color = '

        btn.disabled = true; btn.textContent = '重置中...';
        msg.style.color = '#999'; msg.textContent = '';

        try {
            var res = await fetch('/api/admin/reset-password', {
                method: 'POST',
                body: 'username=' + encodeURIComponent(username) +
                      '&code=' + encodeURIComponent(code) +
                      '&password=' + encodeURIComponent(password) +
                      '&password_confirm=' + encodeURIComponent(password2),
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' }
            });
            var json = await res.json();
            if (json.code === 1) {
                msg.style.color = '#67c23a';
                msg.textContent = '密码重置成功，即将跳转...';
                setTimeout(function() { hideForgotPassword(); }, 1500);
            } else {
                msg.style.color = '#f56c6c';
                msg.textContent = json.msg || '重置失败';
            }
        } catch(err) {
            msg.style.color = '
        } finally {
            btn.disabled = false; btn.textContent = '重置密码';
        }
    }

    async function handleLogin(e) {
        e.preventDefault();
        var msg = document.getElementById('msg');
        msg.style.color = '#999';
        msg.textContent = '登录中...';

        try {
            var res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest' },
                body: 'username=' + encodeURIComponent(document.getElementById('username').value) +
                      '&password=' + encodeURIComponent(document.getElementById('password').value)
            });
            var json = await res.json();
            if (json.code === 1) {
                msg.style.color = '#388e3c';
                msg.textContent = '登录成功，正在跳转...';
                setTimeout(function() { location.href = '/admin/dashboard'; }, 800);
            } else {
                msg.style.color = '#f56c6c';
                msg.textContent = json.msg || '登录失败';
            }
        } catch(err) {
            msg.style.color = '#f56c6c';
            msg.textContent = '请求失败';
        }
    }
    </script>
</body>
</html>
