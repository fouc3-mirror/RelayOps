{extend name="layout"}

{block name="title"}数据库配置 - 雨梦FRPS业务管理系统安装向导{/block}

{block name="content"}
<div class="install-steps">
    <div class="step">
        <div class="step-num">1</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">2</div>
    </div>
    <div class="step-line"></div>
    <div class="step active">
        <div class="step-num">3</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">4</div>
    </div>
</div>

<h2 style="margin-bottom: 20px; color: #333;">数据库配置</h2>

<div id="loading" class="loading">
    <div class="spinner"></div>
    <p>正在测试数据库连接...</p>
</div>

<form id="dbForm">
    <div class="form-row">
        <div class="form-group">
            <label for="db_host">数据库主机</label>
            <input type="text" id="db_host" name="db_host" value="127.0.0.1" required>
        </div>
        <div class="form-group">
            <label for="db_port">数据库端口</label>
            <input type="number" id="db_port" name="db_port" value="3306" required>
        </div>
    </div>

    <div class="form-group">
        <label for="db_name">数据库名</label>
        <input type="text" id="db_name" name="db_name" placeholder="请输入数据库名称" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="db_user">用户名</label>
            <input type="text" id="db_user" name="db_user" placeholder="请输入数据库用户名" required>
        </div>
        <div class="form-group">
            <label for="db_pass">密码</label>
            <input type="password" id="db_pass" name="db_pass" placeholder="请输入数据库密码">
        </div>
    </div>

    <div class="btn-group">
        <a href="{:url('/install/step2')}" class="btn btn-secondary">上一步</a>
        <div>
            <button type="button" class="btn btn-secondary" onclick="testConnection()" style="margin-right: 10px;">测试连接</button>
            <button type="button" class="btn btn-primary" onclick="nextStep()">下一步</button>
        </div>
    </div>
</form>
{/block}

{block name="script"}
<script>
    function testConnection() {
        var form = document.getElementById('dbForm');
        var formData = new FormData(form);

        showLoading();

        fetch('{:url("/install/testDb")}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(function(response) {
            return response.json();
        })
        .then(function(data) {
            hideLoading();
            if (data.code === 1) {
                showMessage('success', data.msg);
            } else {
                showMessage('error', data.msg);
            }
        })
        .catch(function(error) {
            hideLoading();
            showMessage('error', '请求失败：' + error.message);
        });
    }

    function nextStep() {
        var form = document.getElementById('dbForm');
        var formData = new FormData(form);

        // 保存数据到 sessionStorage
        sessionStorage.setItem('db_host', formData.get('db_host'));
        sessionStorage.setItem('db_port', formData.get('db_port'));
        sessionStorage.setItem('db_name', formData.get('db_name'));
        sessionStorage.setItem('db_user', formData.get('db_user'));
        sessionStorage.setItem('db_pass', formData.get('db_pass'));

        window.location.href = '{:url("/install/step4")}';
    }
</script>
{/block}
