{extend name="layout"}

{block name="title"}安装中 - RelayOps安装向导{/block}

{block name="content"}
<div class="install-steps">
    <div class="step">
        <div class="step-num">1</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">2</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">3</div>
    </div>
    <div class="step-line"></div>
    <div class="step active">
        <div class="step-num">4</div>
    </div>
</div>

<h2 style="margin-bottom: 20px; color: #333;">开始安装</h2>

<div id="installContent">
    <div id="loading" class="loading" style="display: block;">
        <div class="spinner"></div>
        <p id="installStatus">正在准备安装...</p>
    </div>

    <div id="progress" class="progress" style="display: block;">
        <div class="progress-bar">
            <div class="progress-bar-fill"></div>
        </div>
        <p class="progress-text">准备中...</p>
    </div>

    <div id="installLog" class="install-log" style="display: block;"></div>
</div>

<div id="installResult" style="display: none;">
    <div class="btn-group" style="justify-content: center;">
        <a id="completeLink" href="{:url('/install/complete')}" class="btn btn-success">进入系统</a>
    </div>
</div>

<div id="errorDetail" style="display: none;"></div>
{/block}

{block name="script"}
<script>
    // 页面加载时自动开始安装
    document.addEventListener('DOMContentLoaded', function() {
        startInstall();
    });

    function startInstall() {
        // 从 sessionStorage 获取数据
        var dbHost = sessionStorage.getItem('db_host') || '127.0.0.1';
        var dbPort = sessionStorage.getItem('db_port') || '3306';
        var dbName = sessionStorage.getItem('db_name') || '';
        var dbUser = sessionStorage.getItem('db_user') || '';
        var dbPass = sessionStorage.getItem('db_pass') || '';
        var adminUser = sessionStorage.getItem('admin_user') || 'admin';
        var adminPass = sessionStorage.getItem('admin_pass') || '';
        var adminEmail = sessionStorage.getItem('admin_email') || '';

        if (!dbName || !dbUser || !adminPass) {
            showMessage('error', '安装信息不完整，请返回上一步重新填写');
            return;
        }

        // 创建 FormData
        var formData = new FormData();
        formData.append('db_host', dbHost);
        formData.append('db_port', dbPort);
        formData.append('db_name', dbName);
        formData.append('db_user', dbUser);
        formData.append('db_pass', dbPass);
        formData.append('admin_user', adminUser);
        formData.append('admin_pass', adminPass);
        formData.append('admin_email', adminEmail);

        // 发送流式安装请求
        fetch('{:url("/install/install")}', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(function(response) {
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            // 读取流式响应
            var reader = response.body.getReader();
            var decoder = new TextDecoder('utf-8');
            var buffer = '';

            function processStream() {
                return reader.read().then(function(result) {
                    if (result.done) {
                        return;
                    }

                    buffer += decoder.decode(result.value, {stream: true});
                    var lines = buffer.split('\n');
                    // 最后一行可能不完整，保留到下次处理
                    buffer = lines.pop();

                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (!line) continue;
                        try {
                            var data = JSON.parse(line);
                            handleProgress(data);
                        } catch (e) {
                            console.warn('解析进度数据失败:', line);
                        }
                    }

                    return processStream();
                });
            }

            return processStream();
        })
        .catch(function(error) {
            updateProgress(0, '安装失败');
            document.getElementById('loading').style.display = 'none';
            document.querySelector('.spinner').style.display = 'none';
            showMessage('error', '请求失败：' + error.message);
        });
    }

    function handleProgress(data) {
        if (data.type === 'progress') {
            updateProgress(data.progress, data.message);
            addLogItem(data.message, 'done');

            // 完成时显示结果
            if (data.step === 'complete') {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('installResult').style.display = 'block';
                if (data.url) {
                    document.getElementById('completeLink').href = data.url;
                }
                // 清除 sessionStorage
                var keys = ['db_host', 'db_port', 'db_name', 'db_user', 'db_pass',
                    'admin_user', 'admin_pass', 'admin_email'];
                for (var i = 0; i < keys.length; i++) {
                    sessionStorage.removeItem(keys[i]);
                }
            }
        } else if (data.type === 'error') {
            updateProgress(0, '安装失败');
            document.getElementById('loading').style.display = 'none';
            document.querySelector('.spinner').style.display = 'none';
            addLogItem('✗ ' + data.message, 'error');
            showErrorDetail(data);
        }
    }

    function addLogItem(message, type) {
        var log = document.getElementById('installLog');
        var item = document.createElement('div');
        item.className = 'log-item ' + (type || '');
        item.textContent = message;
        log.appendChild(item);
        // 自动滚动到底部
        log.scrollTop = log.scrollHeight;
    }

    function showErrorDetail(data) {
        var container = document.getElementById('errorDetail');
        container.style.display = 'block';

        var html = '<div class="alert alert-error" style="margin-top: 20px;">';
        html += '<strong>' + data.message + '</strong>';
        html += '</div>';

        if (data.log && data.log.length > 0) {
            html += '<div class="error-log-container">';
            html += '<div class="error-log-header" onclick="toggleErrorLog()">';
            html += '<span>📋 查看安装日志 (' + data.log.length + ' 条)</span>';
            html += '<span id="logToggleIcon">▼</span>';
            html += '</div>';
            html += '<pre class="error-log" id="errorLogContent">';
            for (var i = 0; i < data.log.length; i++) {
                html += escapeHtml(data.log[i]) + '\n';
            }
            html += '</pre>';
            html += '</div>';
        }

        container.innerHTML = html;
    }

    function toggleErrorLog() {
        var log = document.getElementById('errorLogContent');
        var icon = document.getElementById('logToggleIcon');
        if (log.style.display === 'none') {
            log.style.display = 'block';
            icon.textContent = '▼';
        } else {
            log.style.display = 'none';
            icon.textContent = '▶';
        }
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{/block}
