{extend name="layout"}

{block name="title"}管理员配置 - 雨梦FRPS业务管理系统安装向导{/block}

{block name="content"}
<div class="install-steps">
    <div class="step">
        <div class="step-num">1</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">2</div>
    </div>
    <div class="step-line"></div>
    <div class="step">
        <div class="step-num">3</div>
    </div>
    <div class="step-line"></div>
    <div class="step active">
        <div class="step-num">4</div>
    </div>
</div>

<h2 style="margin-bottom: 20px; color: #333;">管理员配置</h2>

<form id="adminForm">
    <div class="form-group">
        <label for="admin_user">管理员账号</label>
        <input type="text" id="admin_user" name="admin_user" value="admin" required>
    </div>

    <div class="form-group">
        <label for="admin_pass">管理员密码</label>
        <input type="password" id="admin_pass" name="admin_pass" placeholder="请输入管理员密码" required>
    </div>

    <div class="form-group">
        <label for="admin_pass_confirm">确认密码</label>
        <input type="password" id="admin_pass_confirm" placeholder="请再次输入密码" required>
    </div>

    <div class="form-group">
        <label for="admin_email">管理员邮箱 <span style="color:#f56c6c;">* 必填</span></label>
        <input type="email" id="admin_email" name="admin_email" placeholder="用于找回密码，请填写真实邮箱" required>
    </div>

    <div class="form-group">
        <label for="site_name">系统名称</label>
        <input type="text" id="site_name" name="site_name" value="雨梦FRPS业务管理系统" placeholder="请输入系统名称" required>
    </div>

    <div class="form-group">
        <label for="site_description">系统描述</label>
        <textarea id="site_description" name="site_description" rows="3" placeholder="请输入系统描述">雨梦FRPS业务管理系统是一个基于ThinkPHP8开发的FRPS节点管理系统</textarea>
    </div>

    <div class="alert alert-info">
        请牢记管理员账号密码，安装完成后将无法修改。
    </div>

    <div class="btn-group">
        <a href="{:url('/install/step3')}" class="btn btn-secondary">上一步</a>
        <button type="button" class="btn btn-primary" onclick="nextStep()">下一步</button>
    </div>
</form>
{/block}

{block name="script"}
<script>
    function nextStep() {
        var adminUser = document.getElementById('admin_user').value;
        var adminPass = document.getElementById('admin_pass').value;
        var adminPassConfirm = document.getElementById('admin_pass_confirm').value;
        var adminEmail = document.getElementById('admin_email').value;
        var siteName = document.getElementById('site_name').value;
        var siteDescription = document.getElementById('site_description').value;

        if (!adminUser) {
            showMessage('error', '请输入管理员账号');
            return;
        }

        if (!adminPass) {
            showMessage('error', '请输入管理员密码');
            return;
        }

        if (adminPass !== adminPassConfirm) {
            showMessage('error', '两次输入的密码不一致');
            return;
        }

        if (adminPass.length < 6) {
            showMessage('error', '密码长度不能少于6位');
            return;
        }

        if (!adminEmail) {
            showMessage('error', '请输入管理员邮箱');
            return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(adminEmail)) {
            showMessage('error', '请输入正确的邮箱格式');
            return;
        }

        if (!siteName) {
            showMessage('error', '请输入系统名称');
            return;
        }

        // 保存数据到 sessionStorage
        sessionStorage.setItem('admin_user', adminUser);
        sessionStorage.setItem('admin_pass', adminPass);
        sessionStorage.setItem('admin_email', adminEmail);
        sessionStorage.setItem('site_name', siteName);
        sessionStorage.setItem('site_description', siteDescription);

        window.location.href = '{:url("/install/step5")}';
    }
</script>
{/block}
